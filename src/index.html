<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Генератор зображеннь by Pikimell</title>
    <link rel="icon" href="https://img.icons8.com/color/344/free-bsd.png" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css"
      integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap-theme.min.css"
      integrity="sha384-6pzBo3FDv/PJ8r2KRkGHifhEocL+1X2rVCTTkUfGk7/0pbek5mMa1upzvWbrUbOZ"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./style/controls.css" />
    <link rel="stylesheet" href="./style/reset.css" />
    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body>
    <h1><a href="./StringArtBot.html">ART generator BY PIKIMELL</a></h1>
    <div class="generator" id="generator-box">
      <div class="drag-drop" id="drag-drop-box" style="display: none">
        <div class="drag-drop-table">
          <div>Відпустіть файл для завантаження зображення</div>
        </div>
      </div>

      <div class="controls">
        <div class="control-block centered no-top-padding">
          <input
            type="submit"
            id="select-btn"
            value="Вибрати зображення"
          /><br />
        </div>

        <div id="controls-box">
          <div class="control-block no-top-padding">
            <label
              ><b>Форма</b>
              <select id="form-type-box" disabled>
                <option value="circle" selected>коло</option>
                <option value="rect">квадрат</option>
                <option value="album">альбом</option>
                <option value="portrait">портрет</option>
                <option value="image">по зображенню</option>
              </select>
            </label>
          </div>

          <div class="control-block no-top-padding">
            <input type="checkbox" id="invert-box" disabled />
            <label for="invert-box">Інвертувати яскравість</label>
            <br />
            <input type="checkbox" id="draw-box" checked disabled />
            <label for="draw-box">Малювати лінії</label>
          </div>

          <div class="control-block no-margin no-top-padding">
            <label
              ><b>Розмір</b><br />
              <input
                type="range"
                id="size-box"
                value="1"
                min="0.10"
                max="25"
                step="0.10"
                disabled
              />
            </label>
            <div class="range-label" id="size-value">1</div>

            <label
              ><b>Контрастність</b><br />
              <input
                type="range"
                id="contrast-box"
                value="0"
                min="-100"
                max="100"
                step="5"
                disabled
              />
            </label>
            <div class="range-label" id="contrast-value">0</div>

            <label
              ><b>Яскравість</b><br />
              <input
                type="range"
                id="brightness-box"
                value="0"
                min="-100"
                max="100"
                step="5"
                disabled
              />
            </label>
            <div class="range-label" id="brightness-value">0</div>
          </div>

          <div class="control-block no-top-padding">
            <label
              ><b>Розташування цвяхів</b>
              <select id="nails-mode-box" disabled>
                <option value="border" selected>на грані</option>
                <option value="grid">у вигляді сітки</option>
                <option value="random">випадково</option>
              </select>
            </label>
          </div>

          <div class="control-block no-top-padding">
            <label
              ><b>Кількість цвяхів</b><br />
              <input
                type="number"
                id="nails-count-box"
                value="280"
                min="50"
                max="1000"
                disabled
              />
            </label>
          </div>

          <div class="control-block">
            <label
              ><b>Кількість ліній</b><br />
              <input
                type="number"
                id="lines-count-box"
                value="3400"
                min="100"
                max="10000"
                disabled
              />
            </label>
          </div>

          <div class="control-block">
            <label
              ><b>Непрозорість лінії</b><br />
              <input
                type="range"
                id="lines-weight-box"
                value="10"
                min="1"
                max="100"
                disabled
              />
            </label>
            <div class="range-label" id="lines-weight-value">10%</div>
          </div>

          <div class="control-block no-margin">
            <input type="color" id="lines-color-box" value="#000000" disabled />
            <label for="lines-color-box"><b>Колір лінії</b></label>
          </div>

          <div class="control-block">
            <input
              type="color"
              id="background-color-box"
              value="#ffffff"
              disabled
            />
            <label for="background-color-box"><b>Колір фону</b></label>
          </div>

          <div class="control-block centered">
            <input type="submit" id="generate-btn" value="Запустити" disabled />
            <input type="submit" id="reset-btn" value="Скинути" disabled />
            <div id="status-box"></div>
          </div>
        </div>

        <div class="control-block">
          <div id="info-box"></div>
        </div>

        <div id="save-box" style="display: none">
          <hr />
          <div class="control-block no-top-padding">
            <label
              ><b>Формат збереження:</b>
              <select id="save-type-box">
                <option value="png">png</option>
                <option value="svg">svg</option>
                <option value="txt">for bot</option>
                <option value="save">for site</option>
                <option value="stringart">stringart</option>
              </select>
            </label>
          </div>

          <div class="control-block no-top-padding centered">
            <input type="submit" id="save-btn" value="Зберегти" />
          </div>
        </div>
      </div>

      <div class="view">
        <canvas id="canvas"></canvas>
      </div>
    </div>

    <script src="./js/constants.js"></script>
    <script src="./js/string_art_generator.js"></script>
    <script src="./js/init.js"></script>
    <script src="./js/events.js"></script>
    <script src="./js/draw.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
